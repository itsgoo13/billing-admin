<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R31NET - Invoice Generator</title>
    <link rel="icon" type="image/png" href="logo-r31net.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 100%); min-height: 100vh; color: white; padding: 30px; }
        .container { max-width: 900px; margin: 0 auto; }
        .back-btn { color: white; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 12px; text-decoration: none; display: inline-block; margin-bottom: 30px; }
        h1 { color: #00d4ff; margin-bottom: 30px; font-size: 2.2rem; font-weight: 700; }
        .form-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group.full-width { grid-column: span 2; }
        label { display: block; color: #aaa; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 14px 16px; background: #1a1a2e !important; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white !important; font-size: 1rem; outline: none; transition: border-color 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #00d4ff; }
        select option { background: #1a1a2e; color: white; }
        textarea { resize: vertical; min-height: 80px; }
        .btn-primary { padding: 16px 32px; background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 1.1rem; cursor: pointer; width: 100%; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(0, 212, 255, 0.4); }
        .toast { position: fixed; bottom: 30px; right: 30px; padding: 18px 30px; background: #1a1a2e; border-left: 5px solid #00d4ff; border-radius: 16px; color: white; font-weight: 500; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; align-items: center; gap: 12px; z-index: 2000; }
        .toast.success { border-left-color: #2ed573; }
        .toast.error { border-left-color: #ff6b6b; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .form-group.full-width { grid-column: span 1; } }
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard.html" class="back-btn">← Kembali ke Dashboard</a>
    <h1>📄 Invoice Generator</h1>

    <div class="form-card">
        <div class="form-row">
            <div class="form-group">
                <label>👤 Pelanggan</label>
                <select id="customerSelect">
                    <option value="">-- Pilih Pelanggan --</option>
                </select>
            </div>
            <div class="form-group">
                <label>📛 Nama</label>
                <input type="text" id="nama" placeholder="Nama pelanggan">
            </div>
            <div class="form-group">
                <label>🌐 IP Address</label>
                <input type="text" id="ip" placeholder="30.30.30.xxx">
            </div>
            <div class="form-group">
                <label>📦 Paket</label>
                <input type="text" id="paket" placeholder="10M/10M">
            </div>
            <div class="form-group">
                <label>💵 Harga Paket (Rp)</label>
                <input type="number" id="harga" placeholder="200000">
            </div>
            <div class="form-group">
                <label>🏷️ Diskon (Rp)</label>
                <input type="number" id="diskon" placeholder="0" value="0">
            </div>
            <div class="form-group">
                <label>🔧 Biaya Instalasi (Rp)</label>
                <input type="number" id="instalasi" placeholder="0" value="0">
            </div>
            <div class="form-group">
                <label>📡 Sewa Alat (Rp)</label>
                <input type="number" id="sewaAlat" placeholder="0" value="0">
            </div>
            <div class="form-group">
                <label>📅 Tanggal Invoice</label>
                <input type="date" id="tanggalInvoice">
            </div>
            <div class="form-group">
                <label>📞 No. Telepon</label>
                <input type="text" id="telepon" placeholder="0878-xxxx-xxxx">
            </div>
            <div class="form-group full-width">
                <label>📝 Keterangan / Catatan</label>
                <textarea id="keterangan" placeholder="Contoh: Pembayaran bulan Mei 2026, termasuk biaya instalasi..."></textarea>
            </div>
        </div>

        <button class="btn-primary" onclick="generateAndDownload()">
            ⬇️ Generate & Download PDF
        </button>
    </div>
</div>

<div class="toast" id="toast">
    <span id="toastIcon">✅</span>
    <span id="toastMsg"></span>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwUPdb_0y7zZHmva1eUriHijFaBwLlFoU8Ye-OU8kYAHsA7NkdQiCz5vYX6a9YuVv4W/exec';

    document.getElementById('tanggalInvoice').value = new Date().toISOString().split('T')[0];

    async function loadCustomers() {
        try {
            const resp = await fetch(SCRIPT_URL);
            const data = await resp.json();
            const select = document.getElementById('customerSelect');
            data.forEach(c => {
                const opt = document.createElement('option');
                opt.value = JSON.stringify({ nama: c.nama, ip: c.ip, paket: c.paket, harga: c.harga, diskon: c.diskon || 0 });
                opt.textContent = `${c.nama} (${c.ip})`;
                select.appendChild(opt);
            });

            select.addEventListener('change', function() {
                if (this.value) {
                    const d = JSON.parse(this.value);
                    document.getElementById('nama').value = d.nama || '';
                    document.getElementById('ip').value = d.ip || '';
                    document.getElementById('paket').value = d.paket || '';
                    document.getElementById('harga').value = d.harga || '';
                    document.getElementById('diskon').value = d.diskon || 0;
                }
            });

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('nama')) {
                document.getElementById('nama').value = urlParams.get('nama');
                document.getElementById('ip').value = urlParams.get('ip') || '';
                document.getElementById('paket').value = urlParams.get('paket') || '';
                document.getElementById('harga').value = urlParams.get('harga') || '';
                document.getElementById('diskon').value = urlParams.get('diskon') || 0;
            }
        } catch(e) { console.error(e); }
    }

    async function generateAndDownload() {
        const nama = document.getElementById('nama').value.trim();
        const ip = document.getElementById('ip').value.trim();
        const paket = document.getElementById('paket').value.trim();
        const harga = document.getElementById('harga').value;
        const diskon = document.getElementById('diskon').value || 0;
        const instalasi = document.getElementById('instalasi').value || 0;
        const sewaAlat = document.getElementById('sewaAlat').value || 0;
        const tanggal = document.getElementById('tanggalInvoice').value;
        const telepon = document.getElementById('telepon').value.trim();
        const keterangan = document.getElementById('keterangan').value.trim();

        if (!nama || !ip || !paket || !harga) {
            showToast('Nama, IP, Paket, dan Harga wajib diisi', 'error');
            return;
        }

        showToast('⏳ Membuat invoice...', 'success');

        try {
            const params = new URLSearchParams({
                action: 'invoice',
                nama, ip, paket, harga, diskon,
                instalasi, sewaAlat, tanggal, telepon, keterangan
            });

            const resp = await fetch(`${SCRIPT_URL}?${params.toString()}`);
            const res = await resp.json();

            if (res.success) {
                showToast('✅ Invoice siap!', 'success');
                window.open(res.url, '_blank');
            } else {
                showToast('❌ Gagal: ' + (res.message || 'Unknown error'), 'error');
            }
        } catch (e) {
            showToast('❌ Error koneksi', 'error');
        }
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        const icon = document.getElementById('toastIcon');
        const msgEl = document.getElementById('toastMsg');
        icon.textContent = type === 'success' ? '✅' : '❌';
        msgEl.textContent = msg;
        toast.className = 'toast ' + type;
        toast.style.display = 'flex';
        setTimeout(() => toast.style.display = 'none', 4000);
    }

    loadCustomers();
</script>
</body>
</html>
