<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R31NET - Keuangan</title>
    <link rel="icon" type="image/png" href="logo-r31net.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 100%); min-height: 100vh; color: white; padding: 30px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .header a { color: #00d4ff; text-decoration: none; padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 12px; }
        h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, #fff, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 40px; }
        .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 30px; }
        .card.pemasukan .value { color: #2ed573; }
        .card.pengeluaran .value { color: #ff6b6b; }
        .card.profit .value { color: #00d4ff; }
        .card-label { color: #aaa; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .card-value { font-size: 3rem; font-weight: 700; }
        .chart-container { background: rgba(255,255,255,0.02); border-radius: 24px; padding: 30px; margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.05); }
        .table-container { background: rgba(255,255,255,0.02); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #00d4ff; border-bottom: 1px solid rgba(0,212,255,0.2); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .text-right { text-align: right; }
        .loading { text-align: center; padding: 40px; color: #aaa; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: white; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 12px; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard.html" class="back-btn">← Kembali ke Dashboard</a>
    <div class="header">
        <h1>💰 Keuangan R31NET</h1>
        <span style="color:#aaa;">Tahun 2026</span>
    </div>

    <div class="summary-cards">
        <div class="card pemasukan">
            <div class="card-label">📥 Total Pemasukan</div>
            <div class="card-value" id="totalPemasukan">Rp0</div>
        </div>
        <div class="card pengeluaran">
            <div class="card-label">📤 Total Pengeluaran</div>
            <div class="card-value" id="totalPengeluaran">Rp0</div>
        </div>
        <div class="card profit">
            <div class="card-label">📊 Profit/Loss</div>
            <div class="card-value" id="totalProfit">Rp0</div>
        </div>
    </div>

    <div class="chart-container">
        <h3 style="margin-bottom:20px;">📈 Trend Bulanan 2026</h3>
        <canvas id="trendChart" style="max-height:400px;"></canvas>
    </div>

    <div class="table-container">
        <h3 style="margin-bottom:20px;">🧾 Rincian Pengeluaran Rutin</h3>
        <table id="expenseTable">
            <thead><tr><th>Kategori</th><th class="text-right">Total (Rp)</th></tr></thead>
            <tbody id="expenseBody"><tr><td colspan="2" class="loading">Memuat data...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwUPdb_0y7zZHmva1eUriHijFaBwLlFoU8Ye-OU8kYAHsA7NkdQiCz5vYX6a9YuVv4W/exec';

    async function loadFinanceData() {
        try {
            const resp = await fetch(SCRIPT_URL + '?action=keuangan');
            const data = await resp.json();

            document.getElementById('totalPemasukan').textContent = 'Rp ' + formatNumber(data.totalPemasukan);
            document.getElementById('totalPengeluaran').textContent = 'Rp ' + formatNumber(data.totalPengeluaran);
            const profit = data.totalPemasukan - data.totalPengeluaran;
            document.getElementById('totalProfit').textContent = (profit >= 0 ? 'Rp ' : '-Rp ') + formatNumber(Math.abs(profit));

            const ctx = document.getElementById('trendChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.bulanLabels,
                    datasets: [
                        {
                            label: 'Pemasukan',
                            data: data.pemasukanBulanan,
                            borderColor: '#2ed573',
                            backgroundColor: 'rgba(46,213,115,0.1)',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'Pengeluaran',
                            data: data.pengeluaranBulanan,
                            borderColor: '#ff6b6b',
                            backgroundColor: 'rgba(255,107,107,0.1)',
                            tension: 0.3,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: 'white' } } },
                    scales: {
                        x: { ticks: { color: '#aaa' } },
                        y: { ticks: { color: '#aaa', callback: v => 'Rp' + v.toLocaleString('id') } }
                    }
                }
            });

            const tbody = document.getElementById('expenseBody');
            tbody.innerHTML = data.pengeluaranDetail.map(item => `
                <tr><td>${item.kategori}</td><td class="text-right" style="color:#ff6b6b;">Rp ${formatNumber(item.total)}</td></tr>
            `).join('');

        } catch(e) {
            console.error(e);
            document.getElementById('expenseBody').innerHTML = '<tr><td colspan="2" class="loading">❌ Gagal memuat data</td></tr>';
        }
    }

    function formatNumber(n) {
        return n.toLocaleString('id');
    }

    loadFinanceData();
</script>
</body>
</html>
