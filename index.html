<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R31NET - Internet Service Provider</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(0, 212, 255, 0.08) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            animation: float 15s infinite ease-in-out;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            25% { transform: translateY(-30px) translateX(20px); opacity: 0.6; }
            50% { transform: translateY(-50px) translateX(-10px); opacity: 0.8; }
            75% { transform: translateY(-20px) translateX(-30px); opacity: 0.5; }
        }

        .particle:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 20%; left: 85%; animation-delay: 2s; }
        .particle:nth-child(3) { top: 60%; left: 10%; animation-delay: 4s; }
        .particle:nth-child(4) { top: 75%; left: 90%; animation-delay: 1s; }
        .particle:nth-child(5) { top: 40%; left: 50%; animation-delay: 3s; }
        .particle:nth-child(6) { top: 85%; left: 30%; animation-delay: 5s; }
        .particle:nth-child(7) { top: 15%; left: 60%; animation-delay: 2.5s; }
        .particle:nth-child(8) { top: 50%; left: 20%; animation-delay: 3.5s; }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            display: flex;
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .login-left {
            flex: 1;
            padding: 50px 40px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(0, 0, 0, 0.2) 100%);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .login-right {
            flex: 1;
            padding: 50px 40px;
            background: rgba(0, 0, 0, 0.15);
        }

        .brand {
            margin-bottom: 40px;
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .brand h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .brand p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            line-height: 1.6;
        }

        .features {
            margin-top: auto;
            padding-top: 40px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.8);
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .feature-text h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: white;
        }

        .feature-text p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .login-header {
            margin-bottom: 35px;
        }

        .login-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.1);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .remember input {
            width: 18px;
            height: 18px;
            accent-color: #00d4ff;
            cursor: pointer;
        }

        .forgot-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .forgot-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
            background: linear-gradient(135deg, #00e0ff 0%, #00aadd 100%);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 16px;
            font-size: 0.9rem;
            min-height: 24px;
        }

        .login-footer {
            margin-top: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
        }

        .login-footer a {
            color: #00d4ff;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .login-card {
                flex-direction: column;
                max-width: 450px;
            }
            
            .login-left {
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                padding: 35px 30px;
            }
            
            .login-right {
                padding: 35px 30px;
            }
            
            .brand h1 {
                font-size: 2rem;
            }
            
            .features {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Animated particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

<div class="login-wrapper">
    <div class="login-card">
        <!-- Left side - Branding -->
        <div class="login-left">
            <div class="brand">
                <img src="logo-r31net.png" alt="R31NET Logo" style="width: 200px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 10px 20px rgba(0, 212, 255, 0.2));">
                <p style="color: rgba(255, 255, 255, 0.7); font-size: 1rem; line-height: 1.6; margin-top: 10px;">
                    Internet Service Provider<br>Bekasi, Jawa Barat
                </p>
            </div>
            
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">🚀</div>
                    <div class="feature-text">
                        <h4>Kecepatan Tinggi</h4>
                        <p>Up to 50Mbps Unlimited</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔒</div>
                    <div class="feature-text">
                        <h4>Jaringan Aman</h4>
                        <p>Proteksi DDoS & Firewall</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💬</div>
                    <div class="feature-text">
                        <h4>Support 24/7</h4>
                        <p>Teknisi siap membantu</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Right side - Login Form -->
        <div class="login-right">
            <!-- Form login di sini -->
        </div>
    </div>
</div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="username" placeholder="Masukkan username" required autocomplete="off">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember">
                            <input type="checkbox" id="remember"> Ingat saya
                        </label>
                        <a href="#" class="forgot-link" onclick="alert('Hubungi admin R31NET')">Lupa password?</a>
                    </div>
                    
                    <button type="submit" class="btn-login">
                        <span>🚪</span> Masuk Dashboard
                    </button>
                    
                    <div id="errorMessage" class="error-message"></div>
                </form>
                
                <div class="login-footer">
                    <p>© 2026 R31NET. All rights reserved.</p>
                    <p style="margin-top: 10px;">
                        <a href="https://t.me/R31NET_GROUP" target="_blank">📱 Telegram Group</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi login
        const VALID_USERNAME = "admin";
        const VALID_PASSWORD = "r31net2024";
        
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMessage');
        
        // Cek jika sudah login
        const isLoggedIn = localStorage.getItem('r31net_logged_in') === 'true' || 
                          sessionStorage.getItem('r31net_logged_in') === 'true';
        if (isLoggedIn) {
            window.location.href = 'dashboard.html';
        }
        
        // Handle login
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                if (remember) {
                    localStorage.setItem('r31net_logged_in', 'true');
                    localStorage.setItem('r31net_username', username);
                } else {
                    sessionStorage.setItem('r31net_logged_in', 'true');
                    sessionStorage.setItem('r31net_username', username);
                }
                
                // Animasi loading
                const btn = e.target.querySelector('button');
                btn.innerHTML = '<span>⏳</span> Memuat...';
                btn.style.opacity = '0.8';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            } else {
                errorMsg.textContent = '❌ Username atau password salah!';
                errorMsg.style.animation = 'shake 0.3s';
                setTimeout(() => errorMsg.style.animation = '', 300);
                
                // Clear password field
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
        
        // Enter key to submit
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
        
        // Shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
