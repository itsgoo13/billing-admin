<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R31NET - Login</title>
    <link rel="icon" type="image/png" href="logo-r31net.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 100%);
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 1000px;
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .login-left {
            flex: 1;
            padding: 50px 40px;
            background: rgba(0, 0, 0, 0.15);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .login-right {
            flex: 1;
            padding: 50px 40px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(0, 0, 0, 0.2) 100%);
        }

        .brand {
            margin-bottom: 40px;
        }

        .brand h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .brand p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            line-height: 1.6;
        }

        .features {
            margin-top: 50px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.8);
        }

        .feature-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .feature-text h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: white;
        }

        .feature-text p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .login-header {
            margin-bottom: 35px;
        }

        .login-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.1);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .remember input {
            width: 18px;
            height: 18px;
            accent-color: #00d4ff;
            cursor: pointer;
        }

        .forgot-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .forgot-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 16px;
            font-size: 0.9rem;
            min-height: 24px;
        }

        .login-footer {
            margin-top: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
                max-width: 450px;
            }

            .login-left {
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                padding: 35px 30px;
            }

            .login-right {
                padding: 35px 30px;
            }

            .brand h1 {
                font-size: 2rem;
            }

            .features {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Sisi Kiri: Branding -->
        <div class="login-left">
            <div class="brand">
                <h1>R31NET</h1>
                <p>Internet Service Provider<br>Bekasi, Jawa Barat</p>
            </div>

            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">🚀</div>
                    <div class="feature-text">
                        <h4>Kecepatan Tinggi</h4>
                        <p>Up to 50Mbps Unlimited</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔒</div>
                    <div class="feature-text">
                        <h4>Jaringan Aman</h4>
                        <p>Proteksi DDoS & Firewall</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💬</div>
                    <div class="feature-text">
                        <h4>Support 24/7</h4>
                        <p>Teknisi siap membantu</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sisi Kanan: Form Login -->
        <div class="login-right">
            <div class="login-header">
                <h2>Selamat Datang</h2>
                <p>Silakan login untuk mengakses dashboard</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" placeholder="Masukkan username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember">
                        <input type="checkbox" id="remember"> Ingat saya
                    </label>
                    <a href="#" class="forgot-link" onclick="alert('Hubungi admin')">Lupa password?</a>
                </div>

                <button type="submit" class="btn-login">🚪 Masuk Dashboard</button>

                <div id="errorMessage" class="error-message"></div>
            </form>

            <div class="login-footer">
                <p>© 2026 R31NET. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script>
        const VALID_USERNAME = "admin";
        const VALID_PASSWORD = "r31net2024";

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMessage');

        // Redirect jika sudah login
        if (localStorage.getItem('r31net_logged_in') === 'true' || sessionStorage.getItem('r31net_logged_in') === 'true') {
            window.location.href = 'dashboard.html';
        }

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                if (remember) {
                    localStorage.setItem('r31net_logged_in', 'true');
                    localStorage.setItem('r31net_username', username);
                } else {
                    sessionStorage.setItem('r31net_logged_in', 'true');
                    sessionStorage.setItem('r31net_username', username);
                }

                window.location.href = 'dashboard.html';
            } else {
                errorMsg.textContent = '❌ Username atau password salah!';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
