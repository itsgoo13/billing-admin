<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>R31NET Admin</title>
    <script>
        // Proteksi login - hanya bisa akses jika sudah login
        const isLoggedIn = localStorage.getItem('r31net_logged_in') === 'true' || 
                          sessionStorage.getItem('r31net_logged_in') === 'true';
        
        if (!isLoggedIn) {
            // Redirect ke halaman login kalau belum login
            window.location.href = 'index.html';
        }
        
        // Fungsi logout
        function logout() {
            localStorage.removeItem('r31net_logged_in');
            localStorage.removeItem('r31net_username');
            sessionStorage.removeItem('r31net_logged_in');
            sessionStorage.removeItem('r31net_username');
            window.location.href = 'index.html';
        }
        
        // Tampilkan username saat halaman dimuat
        document.addEventListener('DOMContentLoaded', function() {
            const username = localStorage.getItem('r31net_username') || 
                             sessionStorage.getItem('r31net_username') || 'Admin';
            const userDisplay = document.getElementById('usernameDisplay');
            if (userDisplay) userDisplay.textContent = username;
        });
    </script>
    <!-- ===== SELESAI TAMBAHAN ===== -->
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <h2>R31NET</h2>
    <div style="padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px;">
        <div style="color: #aaa; font-size: 0.8rem;">Logged in as</div>
        <div style="color: #00d4ff; font-weight: bold;">
            👤 <span id="usernameDisplay">Admin</span>
        </div>
        <button onclick="logout()" style="margin-top: 10px; width: 100%; padding: 8px; background: #ff4757; color: white; border: none; border-radius: 6px; cursor: pointer;">
            🚪 Logout
        </button>
    </div>
        
    <ul>
      <li>Dashboard</li>
      <li>Pelanggan</li>
    </ul>
  </aside>

  <main class="main">
    <h1>Billing Dashboard</h1>

    <div class="stats">
      <div class="card">Aktif: <span id="aktif">0</span></div>
      <div class="card">Suspend: <span id="suspend">0</span></div>
      <div class="card">Total: <span id="total">0</span></div>
    </div>
  <div class="actions">
  <button class="btn-main" onclick="syncMikrotik()">🔄 Sync Mikrotik</button>
  <button class="btn-main" onclick="updateGithub()">🚀 Update GitHub</button>
</div>

    <input id="search" placeholder="Cari pelanggan...">

    <div id="loading">Loading...</div>

    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>Nama</th>
            <th>IP</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
